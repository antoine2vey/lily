appId: com.lilyapp.app
name: Lily store-screenshot capture
# Intentionally NO `env:` block defaults for OUTPUT_DIR or LOCALE_CODE
# — Maestro's template substitution snapshots YAML env defaults at
# parse time and they can win over CLI `--env` values for some command
# types. Orchestrator (scripts/screenshots/run.ts) passes both via
# --env per run, so omitting defaults is safe and avoids that pitfall.
#
# Timeouts are generous throughout because Android emulators are slow:
# cold boot + JS bundle eval + navigation transitions can each be 2–3×
# their iOS-sim equivalents. Values are worst-case ceilings, not wait
# durations — the flow advances as soon as the target element appears.
env:
  DEMO_EMAIL: antoine@lily.app
---

# 1. Force unauthenticated state. Platform-specific because:
#    - iOS: auth token lives in the Keychain (expo-secure-store →
#      Security framework). `clearKeychain` wipes it. DO NOT use
#      clearState here: it'd wipe the dev client's remembered
#      Metro URL and dump us on the server picker.
#    - Android: auth token lives in SharedPreferences encrypted with
#      an Android Keystore key (expo-secure-store's Android impl).
#      `clearState` wipes the app's data dir (including those prefs).
#      `clearKeychain` is an iOS-only no-op on Android.
- runFlow:
    when:
      platform: iOS
    commands:
      - clearKeychain
- runFlow:
    when:
      platform: Android
    commands:
      - clearState

# 2. Cold-launch the app.
- launchApp

# 2a. Tell Expo Dev Client which Metro bundle to load. Only relevant on
#     dev builds where the dev client has no cached last-URL (fresh
#     install, or sim was reset). Release builds ignore this URL path.
#     METRO_URL is set per-platform by scripts/screenshots/run.ts:
#     iOS → http://localhost:8081 (sim shares host network),
#     Android → http://10.0.2.2:8081 (emulator's alias for host loopback).
- openLink: "lily://expo-development-client/?url=${METRO_URL}"

# 2b. Dismiss the expo-dev-launcher onboarding sheet ("This is the
#     developer menu...") which appears after `clearState` wipes the
#     "seen" flag. The sheet slides up with a ~300ms animation after
#     the openLink intent — a single optional tap fires too early and
#     no-ops while the sheet is still off-screen, then the sheet
#     occludes the login screen for the rest of the flow.
#
#     Poll for up to ~10s: each iteration tries Continue (en) and
#     Continuer (fr) as optional taps, then waits for any animation
#     to settle before the next attempt. Once the sheet is dismissed
#     (or never appeared), subsequent optional taps are no-ops.
#     `login-email-input` assertion below confirms the dismiss worked.
- runFlow:
    when:
      platform: Android
    commands:
      - repeat:
          times: 10
          commands:
            # Onboarding sheet (en/fr) — dismiss to reveal the launcher.
            - tapOn:
                text: "Continue"
                optional: true
            - tapOn:
                text: "Continuer"
                optional: true
            # Launcher home view when `clearState` wiped the last-URL
            # and openLink didn't auto-trigger a bundle fetch. Tapping
            # `Reload` forces the launcher to download from the
            # connected Metro URL and execute the JS bundle.
            - tapOn:
                text: "Reload"
                optional: true
            - waitForAnimationToEnd:
                timeout: 1000

# 3. Wait for the login screen. On Android this is the slowest wait of
#    the flow — emulator is cold, JS bundle hasn't been evaluated yet.
- extendedWaitUntil:
    visible:
      id: login-email-input
    timeout: 120000

# 4. Log in. Submit via the keyboard's "go" key (TextInput's
#    onSubmitEditing → handleSubmit) rather than tapping the submit
#    button. On Android the soft keyboard covers the button and Maestro
#    can't tap views behind the IME. `hideKeyboard` is unsafe here — it
#    sends Back which can exit the app if the IME has already auto-
#    dismissed. `pressKey: Enter` fires the keyboard's submit action
#    consistently on both platforms.
- tapOn:
    id: login-email-input
- inputText: "${DEMO_EMAIL}"
- pressKey: Enter

# 4a. Skip the post-login user-experience onboarding ("Welcome to Lily,
#     Alex! Tell us about your plant experience"). The seed-demo user
#     gets recreated by `clearState` cycles without `hasCompletedOnboarding`
#     set, so this screen reliably gates the path to home. Optional
#     because returning users (who finished onboarding once on the
#     server) bypass it entirely. testID is more stable than matching
#     localized "Skip onboarding" / "Passer l'introduction" text.
- tapOn:
    id: onboarding-skip-button
    optional: true

# 5. Wait for home to render. `home-screen` testID is on the root View.
#    On Android this includes the (tabs) group mounting, which is
#    heavier than iOS due to how Fabric handles layout.
- extendedWaitUntil:
    visible:
      id: home-screen
    timeout: 60000
- waitForAnimationToEnd

# 6. Pin locale via Settings UI. Deep-link the settings route directly.
- openLink: "lily:///settings"
- extendedWaitUntil:
    visible:
      id: settings-language-row
    timeout: 30000

# 7. Open language modal → pick locale by testID → modal auto-dismisses.
- tapOn:
    id: settings-language-row
- extendedWaitUntil:
    visible:
      id: "language-option-${LOCALE_CODE}"
    timeout: 15000
- tapOn:
    id: "language-option-${LOCALE_CODE}"
- waitForAnimationToEnd

# 8. Home screenshot — deep-link instead of tapping the tab.
- openLink: "lily:///"
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      id: home-screen
    timeout: 30000
- takeScreenshot: "${OUTPUT_DIR}/home"

# 9. Plants tab — deep-link, then wait for the grid to settle.
- openLink: "lily:///plants"
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      id: plants-grid
    timeout: 30000
- takeScreenshot: "${OUTPUT_DIR}/plants"

# 10. Plant detail — tap the first visible plant card by testID regex.
- tapOn:
    id: "plant-card-.*"
    index: 0
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      id: "plant-detail-screen"
    timeout: 30000
- takeScreenshot: "${OUTPUT_DIR}/plant-detail"

# 10a. Ask Lily — AI chat about this plant. Tap the chat-cta card that
#      lives on plant-detail (testID="chat-cta"). Chat is a stack push,
#      so `back` reliably pops it afterward.
- tapOn:
    id: "chat-cta"
- extendedWaitUntil:
    visible:
      id: "chat-screen"
    timeout: 15000
- waitForAnimationToEnd
- takeScreenshot: "${OUTPUT_DIR}/chat"
# Tap the explicit back button (testID=chat-back-button) rather than
# using Maestro's `back` — the latter is unreliable on iOS. The button
# fires router.back() which reliably pops the push-stack to plant-detail.
- tapOn:
    id: "chat-back-button"
- extendedWaitUntil:
    visible:
      id: "plant-detail-screen"
    timeout: 10000

# 10b. Care history — scroll to the Recent History section on
#      plant-detail, tap "View all" (testID="view-all-history"), wait
#      for the timeline to render, screenshot. Back to plant-detail.
- scrollUntilVisible:
    element:
      id: "view-all-history"
    direction: DOWN
    timeout: 8000
    # Default is 100% — the button sits at the bottom of the scroll
    # view above the home-indicator safe area, so on Android it ends
    # up ~80–90% visible at the natural scroll bottom. 60% is enough
    # to confirm the element is anchored on screen and tappable.
    visibilityPercentage: 60
- tapOn:
    id: "view-all-history"
- extendedWaitUntil:
    visible:
      id: "timeline"
    timeout: 15000
- waitForAnimationToEnd
- takeScreenshot: "${OUTPUT_DIR}/care-history"

# 10c. AI identification results — deep link with a `?demo=1` switch.
#      The screen reads `demo=1` and renders a hardcoded fixture
#      (DEMO_RESULT in AIIdentificationResultsScreen.tsx). Previously
#      the result was passed inline as a URL-encoded JSON query string,
#      but on Android `am start` (which Maestro uses for openLink)
#      silently drops or mis-routes intents with URLs over ~500 chars
#      containing `%` + `+` mixes — the result was the previous screen
#      (care-history) staying in place and being screenshotted by
#      mistake. The `ai-results-screen` testID assertion catches that
#      class of regression now.
- openLink: "lily:///add-plant/ai-results?demo=1"
- extendedWaitUntil:
    visible:
      id: "ai-results-screen"
    timeout: 15000
- waitForAnimationToEnd
- takeScreenshot: "${OUTPUT_DIR}/ai-results"

# 11. Care tab — two captures at different scroll positions so the
#     "care" and "reminders" composites show distinct content:
#     - care.png: top of tab (Overdue section — urgent)
#     - reminders.png: scrolled to Upcoming (scheduled reminders)
- openLink: "lily:///care"
# Wait for care screen to mount AND for the React Query "Refreshing..."
# banner to settle. The banner shows during stale-while-revalidate and
# would otherwise appear in the screenshot as a blue bar at the top.
- extendedWaitUntil:
    visible:
      id: "care-screen"
    timeout: 15000
- extendedWaitUntil:
    notVisible:
      text: "Refreshing|Actualisation"
    timeout: 10000
- waitForAnimationToEnd
- takeScreenshot: "${OUTPUT_DIR}/care"
# Scroll down so reminders.png shows the upcoming schedule section
# with different plants and dates than care.png. `scrollUntilVisible`
# is a no-op if the target text is already on screen — "Upcoming" is
# partially visible at the top of care.png's viewport, so we use
# two raw `scroll` actions instead to move the viewport a full page.
- scroll
- scroll
- waitForAnimationToEnd
- takeScreenshot: "${OUTPUT_DIR}/reminders"

# 12. Rooms — organizational view showing plants grouped by physical
#     space (Living Room, Bedroom, Kitchen, Balcony). Seeded with a
#     realistic distribution so the screen isn't empty. Deep link
#     goes directly to /rooms.
- openLink: "lily:///rooms"
- waitForAnimationToEnd
- takeScreenshot: "${OUTPUT_DIR}/rooms"
