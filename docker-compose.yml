version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: lily-postgres
    environment:
      POSTGRES_DB: lily
      POSTGRES_USER: lily
      POSTGRES_PASSWORD: lily123
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U lily -d lily']
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-test:
    image: postgres:15-alpine
    container_name: lily-postgres-test
    environment:
      POSTGRES_DB: lily_test
      POSTGRES_USER: lily
      POSTGRES_PASSWORD: lily123
    ports:
      - '5433:5432'
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U lily -d lily_test']
      interval: 10s
      timeout: 5s
      retries: 5

  knowledge-db:
    image: pgvector/pgvector:pg17
    container_name: lily-knowledge-db
    environment:
      POSTGRES_DB: lily_knowledge
      POSTGRES_USER: lily
      POSTGRES_PASSWORD: lily123
    ports:
      - '5434:5432'
    volumes:
      - knowledge_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U lily -d lily_knowledge']
      interval: 10s
      timeout: 5s
      retries: 5

  knowledge-db-test:
    image: pgvector/pgvector:pg17
    container_name: lily-knowledge-db-test
    environment:
      POSTGRES_DB: lily_knowledge_test
      POSTGRES_USER: lily
      POSTGRES_PASSWORD: lily123
    ports:
      - '5435:5432'
    volumes:
      - knowledge_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U lily -d lily_knowledge_test']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: lily-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: lily-api
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://lily:lily123@postgres:5432/lily
      KNOWLEDGE_DATABASE_URL: postgresql://lily:lily123@knowledge-db:5432/lily_knowledge
      REDIS_URL: redis://redis:6379
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
      knowledge-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./packages/api:/app/packages/api
      - /app/packages/api/node_modules
    command: bun run dev

volumes:
  postgres_data:
  postgres_test_data:
  knowledge_data:
  knowledge_test_data:
  redis_data:
