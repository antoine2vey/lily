version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: lily-postgres
    environment:
      POSTGRES_DB: lily
      POSTGRES_USER: lily
      POSTGRES_PASSWORD: lily123
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U lily -d lily']
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-test:
    image: postgres:15-alpine
    container_name: lily-postgres-test
    environment:
      POSTGRES_DB: lily_test
      POSTGRES_USER: lily
      POSTGRES_PASSWORD: lily123
    ports:
      - '5433:5432'
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U lily -d lily_test']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: lily-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: lily-jaeger
    ports:
      - '16686:16686'  # UI
      - '4318:4318'    # OTLP HTTP
    environment:
      COLLECTOR_OTLP_ENABLED: true

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lily-api
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://lily:lily123@postgres:5432/lily
      REDIS_URL: redis://redis:6379
      NODE_ENV: development
      OTEL_ENABLED: true
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318/v1/traces
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      jaeger:
        condition: service_started
    volumes:
      - ./packages/api:/app/packages/api
      - /app/packages/api/node_modules
    command: bun run dev

volumes:
  postgres_data:
  postgres_test_data:
  redis_data:
