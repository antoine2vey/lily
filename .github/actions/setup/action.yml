name: Setup
description: Checkout-aware setup — Bun + frozen install + Turbo remote cache backed by GH Actions cache.

inputs:
  bun-version:
    description: Bun version to install
    required: false
    default: '1.3.8'
  turbo-cache:
    description: Whether to wire up the Turbo remote-cache shim
    required: false
    default: 'true'

runs:
  using: composite
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: ${{ inputs.bun-version }}

    - name: Restore bun install cache
      uses: actions/cache@v4
      with:
        path: ~/.bun/install/cache
        key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
        restore-keys: ${{ runner.os }}-bun-

    - name: Install dependencies
      shell: bash
      run: bun install --frozen-lockfile

    - name: Configure Turbo remote cache
      if: inputs.turbo-cache == 'true'
      uses: rharkor/caching-for-turbo@v2.4.2
