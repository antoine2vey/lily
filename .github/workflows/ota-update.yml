name: OTA Update

on:
  push:
    branches: [main]
    tags-ignore:
      - 'v*'
    paths:
      - 'packages/app/**'
      - 'packages/shared/**'
      - '!packages/app/eas.json'
      - '!packages/app/app.json'

jobs:
  update:
    # Skip if this is a version tag commit
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}
    name: Publish OTA Update
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if app/shared was actually affected
        id: affected
        run: |
          # Defense in depth: the YAML `paths:` filter above has misfired at
          # least once (run 26509635618 published an OTA for a blog-only diff).
          # Confirm with a real git diff before paying for an EAS publish.
          if git diff --name-only HEAD^1 HEAD \
            | grep -E '^packages/(app|shared)/' \
            | grep -vE '^packages/app/(eas|app)\.json$' \
            | grep -q .; then
            echo "result=true" >> "$GITHUB_OUTPUT"
          else
            echo "result=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No packages/app or packages/shared changes in HEAD; skipping EAS publish."
          fi

      - name: Setup
        if: steps.affected.outputs.result == 'true'
        uses: ./.github/actions/setup
        with:
          turbo-cache: 'false'

      - name: Setup EAS
        if: steps.affected.outputs.result == 'true'
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish update
        if: steps.affected.outputs.result == 'true'
        working-directory: packages/app
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
          # Pass via env, not template substitution, so the shell never sees
          # unescaped quotes/special chars from the commit body.
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          # Use only the subject line (first line). Commit bodies with
          # quotes or backticks previously broke eas update arg parsing.
          SUBJECT="${COMMIT_MESSAGE%%$'\n'*}"
          eas update \
            --branch production \
            --environment production \
            --message "$SUBJECT" \
            --non-interactive
