name: OTA Update

on:
  push:
    branches: [main]
    tags-ignore:
      - 'v*'
    paths:
      - 'packages/app/**'
      - 'packages/shared/**'
      - '!packages/app/eas.json'
      - '!packages/app/app.json'
  # Manual trigger to publish the current HEAD on demand — e.g. to ship
  # app/shared changes that a server-only push left unpublished.
  workflow_dispatch:

jobs:
  update:
    # Skip if this is a version tag commit
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}
    name: Publish OTA Update
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so the affected-check can diff the entire push range
          # (github.event.before..after), which may span many commits.
          fetch-depth: 0

      - name: Check if app/shared was actually affected
        id: affected
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.event.after }}
        run: |
          # A manual run is an explicit operator request — always publish the
          # current bundle (the escape hatch for shipping changes an earlier
          # push left unpublished).
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "result=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Manual dispatch — publishing OTA from current HEAD."
            exit 0
          fi

          # Diff the WHOLE push range, not just HEAD^1..HEAD. A multi-commit
          # push whose tip is server-only (e.g. an api commit on top of an app
          # fix) would otherwise read as "no app changes" and silently skip the
          # OTA, stranding the app/shared changes on main. The all-zeros SHA
          # (new branch / some force-pushes) isn't a real ref — fall back to the
          # tip commit's diff in that case.
          if [ -z "$BEFORE_SHA" ] \
            || [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ] \
            || ! git cat-file -e "${BEFORE_SHA}^{commit}" 2>/dev/null; then
            RANGE="HEAD^1 HEAD"
          else
            RANGE="$BEFORE_SHA $AFTER_SHA"
          fi

          # Defense in depth: the YAML `paths:` filter above has misfired at
          # least once (run 26509635618 published an OTA for a blog-only diff).
          # Confirm with a real git diff before paying for an EAS publish.
          if git diff --name-only $RANGE \
            | grep -E '^packages/(app|shared)/' \
            | grep -vE '^packages/app/(eas|app)\.json$' \
            | grep -q .; then
            echo "result=true" >> "$GITHUB_OUTPUT"
          else
            echo "result=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No packages/app or packages/shared changes in this push; skipping EAS publish."
          fi

      - name: Setup
        if: steps.affected.outputs.result == 'true'
        uses: ./.github/actions/setup
        with:
          turbo-cache: 'false'

      - name: Setup EAS
        if: steps.affected.outputs.result == 'true'
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish update
        if: steps.affected.outputs.result == 'true'
        working-directory: packages/app
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
          # Pass via env, not template substitution, so the shell never sees
          # unescaped quotes/special chars from the commit body.
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          # Use only the subject line (first line). Commit bodies with
          # quotes or backticks previously broke eas update arg parsing.
          # head_commit is null on workflow_dispatch — fall back to git.
          SUBJECT="${COMMIT_MESSAGE%%$'\n'*}"
          if [ -z "$SUBJECT" ]; then
            SUBJECT="$(git log -1 --pretty=%s)"
          fi
          eas update \
            --branch production \
            --environment production \
            --message "$SUBJECT" \
            --non-interactive
