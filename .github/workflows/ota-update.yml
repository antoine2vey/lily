name: OTA Update

on:
  push:
    branches: [main]
    tags-ignore:
      - 'v*'
    paths:
      - 'packages/app/**'
      - 'packages/shared/**'
      - '!packages/app/eas.json'
      - '!packages/app/app.json'

jobs:
  update:
    # Skip if this is a version tag commit
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}
    name: Publish OTA Update
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Check if app is affected
        id: affected
        run: |
          COUNT=$(bunx turbo run build --filter=@lily/app...[HEAD^1] --dry-run=json | jq '.tasks | length')
          echo "result=$([ "$COUNT" -gt 0 ] && echo true || echo false)" >> $GITHUB_OUTPUT

      - name: Setup EAS
        if: steps.affected.outputs.result == 'true'
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish update
        if: steps.affected.outputs.result == 'true'
        working-directory: packages/app
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
        run: eas update --branch production --message "${{ github.event.head_commit.message }}" --non-interactive
