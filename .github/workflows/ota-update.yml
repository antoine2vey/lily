name: OTA Update

on:
  push:
    branches: [main]
    tags-ignore:
      - 'v*'
    paths:
      - 'packages/app/**'
      - 'packages/shared/**'
      - '!packages/app/eas.json'
      - '!packages/app/app.json'

jobs:
  update:
    # Skip if this is a version tag commit
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}
    name: Publish OTA Update
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup
        with:
          turbo-cache: 'false'

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish update
        working-directory: packages/app
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
          # Pass via env, not template substitution, so the shell never sees
          # unescaped quotes/special chars from the commit body.
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          # Use only the subject line (first line). Commit bodies with
          # quotes or backticks previously broke eas update arg parsing.
          SUBJECT="${COMMIT_MESSAGE%%$'\n'*}"
          eas update \
            --branch production \
            --environment production \
            --message "$SUBJECT" \
            --non-interactive
