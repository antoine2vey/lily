name: CI

on:
  push:
    branches: [main, develop]
    tags-ignore:
      - 'v*'
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      api_db: ${{ steps.filter.outputs.api_db }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api_db:
              - 'packages/api/**'
              - 'packages/db/**'
              - 'packages/shared/**'
              - 'bun.lock'
              - 'package.json'
              - '.github/workflows/ci.yml'
              - '.github/actions/setup/**'

  checks:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Run Turbo pipeline
        run: bun x turbo run lint tsc test build
      - name: Check bundle sizes
        run: bash scripts/check-bundle-sizes.sh

  integration:
    name: Integration tests
    needs: changes
    if: needs.changes.outputs.api_db == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lily_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --tmpfs /var/lib/postgresql/data:rw
    env:
      DATABASE_URL_TEST: postgres://postgres:postgres@localhost:5432/lily_test
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/lily_test
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Setup test database
        run: bun run db:setup-test
      - name: Run integration tests
        run: bun run test:integration

  summary:
    name: CI summary
    if: always()
    needs: [checks, integration]
    runs-on: ubuntu-latest
    steps:
      - name: Verify required jobs
        run: |
          checks='${{ needs.checks.result }}'
          integration='${{ needs.integration.result }}'
          echo "checks=$checks integration=$integration"
          if [ "$checks" != 'success' ]; then
            echo '::error::checks job did not succeed'
            exit 1
          fi
          if [ "$integration" != 'success' ] && [ "$integration" != 'skipped' ]; then
            echo '::error::integration job failed'
            exit 1
          fi
