name: Android Build

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build and Submit to Play Internal Track
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.8'

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: bun install

      - name: Write Google Play service account key
        working-directory: packages/app
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -z "$GOOGLE_SERVICE_ACCOUNT_JSON" ]; then
            echo "::error::GOOGLE_SERVICE_ACCOUNT_JSON secret is not set"
            exit 1
          fi
          printf '%s' "$GOOGLE_SERVICE_ACCOUNT_JSON" > google-service-account.json

      - name: Build and submit
        working-directory: packages/app
        run: eas build --platform android --profile production --auto-submit --non-interactive

      - name: Publish OTA update for new fingerprint
        working-directory: packages/app
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
        run: eas update --platform android --branch production --environment production --message "Seed update for ${{ github.ref_name }} (android)" --non-interactive

      - name: Clean up service account key
        if: always()
        working-directory: packages/app
        run: rm -f google-service-account.json
