name: iOS Build

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build and Submit to TestFlight
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.8'

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: bun install

      - name: Build and submit
        working-directory: packages/app
        run: eas build --platform ios --profile production --auto-submit --non-interactive
        env:
          EXPO_APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.EXPO_APPLE_APP_SPECIFIC_PASSWORD }}

      - name: Publish OTA update for new fingerprint
        working-directory: packages/app
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
        run: eas update --branch production --environment production --message "Seed update for ${{ github.ref_name }}" --non-interactive
